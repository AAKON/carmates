<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Stylized tire tread: repeating diagonal chevron blocks -->
  <defs>
    <!-- One diagonal tread block -->
    <polygon id="blk" points="0,18 10,0 26,0 16,18" fill="rgba(124, 58, 237, 0.05)"/>
  </defs>

  <!-- First track: left-to-right chevrons -->
  <use href="#blk" x="0"  y="8" />
  <use href="#blk" x="24" y="8" />
  <use href="#blk" x="48" y="8" />
  <use href="#blk" x="72" y="8" />

  <!-- Second row, slightly offset -->
  <use href="#blk" x="12" y="32" />
  <use href="#blk" x="36" y="32" />
  <use href="#blk" x="60" y="32" />

  <!-- Mirror the blocks for the opposite track -->
  <g transform="translate(96, 48) scale(-1, 1)">
    <use href="#blk" x="0"  y="8" />
    <use href="#blk" x="24" y="8" />
    <use href="#blk" x="48" y="8" />
    <use href="#blk" x="72" y="8" />

    <use href="#blk" x="12" y="32" />
    <use href="#blk" x="36" y="32" />
    <use href="#blk" x="60" y="32" />
  </g>
</svg>
